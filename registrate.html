  <link rel="stylesheet" href="style.css" />
</head>
<body>

    <div class="container">
      <a class="navbar-brand" href="index.html">CompuStore</a>

          </li>
        </ul>
      </div>

  </nav>

  <main class="container my-5">
    <div class="row justify-content-center">
      <div class="col-lg-6">
        <div class="card shadow-sm border-0 rounded-4">
          <div class="card-body p-4">
            <h2 class="card-title text-center mb-4 fw-bold">Regístrate</h2>
            <form id="registroForm" novalidate>
              <div class="mb-3">
                <label for="nombre" class="form-label fw-semibold">Nombre</label>
                <input type="text" class="form-control" id="nombre" name="nombre" placeholder="Ej: Juan" required>
              </div>
              <div class="mb-3">
                <label for="apellidoPaterno" class="form-label fw-semibold">Apellido paterno</label>
                <input type="text" class="form-control" id="apellidoPaterno" name="apellidoPaterno" placeholder="Ej: Pérez" required>
              </div>
              <div class="mb-3">
                <label for="apellidoMaterno" class="form-label fw-semibold">Apellido materno</label>
                <input type="text" class="form-control" id="apellidoMaterno" name="apellidoMaterno" placeholder="Ej: López" required>
              </div>
              <div class="mb-3">
                <label for="usuario" class="form-label fw-semibold">Nombre de usuario</label>
                <input type="text" class="form-control" id="usuario" name="usuario" placeholder="Ej: compu123" required>
              </div>
              <div class="mb-3">
                <label for="correo" class="form-label fw-semibold">Correo electrónico</label>
                <input type="email" class="form-control" id="correo" name="correo" placeholder="Ej: correo@ejemplo.com" required>
              </div>
              <div class="mb-3">
                <label for="contrasena" class="form-label fw-semibold">Contraseña</label>
                <input type="password" class="form-control" id="contrasena" name="contrasena" placeholder="Ej: Abc12345!" required>
              </div>
              <button type="submit" class="btn btn-primary w-100 btn-lg mt-2">Crear cuenta</button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </main>

  <footer class="bg-dark text-white py-4">
    <div class="container text-center">
      <p class="mb-3 mb-md-2 fw-bold">VISÍTANOS EN NUESTRAS REDES</p>
    <div class="d-flex justify-content-center gap-3">
  <a href="https://www.facebook.com" target="_blank" rel="noopener noreferrer" aria-label="Facebook">

</div>
      <p class="mt-3 mb-0 text-muted small">© 2026 Derechos Reservados</p>
    </div>
  </footer>

  <script src="js/bootstrap.bundle.min.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", function () {
      const form = document.getElementById("registroForm");
      const nombreInput = document.getElementById("nombre");
      const correoInput = document.getElementById("correo");
      const contrasenaInput = document.getElementById("contrasena");

      form.addEventListener("submit", function (event) {
        const nombreValue = nombreInput.value.trim();
        const correoValue = correoInput.value.trim();
        const contrasenaValue = contrasenaInput.value;
        let mensajeError = "";

        if (!/^[A-ZÁÉÍÓÚÑ]/.test(nombreValue)) {
          mensajeError += "El nombre debe iniciar con mayúscula.\n";
        }

        if (/\s/.test(correoValue)) {
          mensajeError += "El correo no puede contener espacios.\n";
        } else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(correoValue)) {
          mensajeError += "Ingresa un correo electrónico válido.\n";
        }

        if (contrasenaValue.length < 8) {
          mensajeError += "La contraseña debe tener al menos 8 caracteres.\n";
        }
        if (!/[A-Z]/.test(contrasenaValue)) {
          mensajeError += "La contraseña debe incluir al menos una letra mayúscula.\n";
        }
        if (!/[a-z]/.test(contrasenaValue)) {
          mensajeError += "La contraseña debe incluir al menos una letra minúscula.\n";
        }
        if (!/[!@#$%^&*()_\-+=\[\]{};:'"\\|,<.>\/\?¿¡~`]/.test(contrasenaValue)) {
          mensajeError += "La contraseña debe incluir al menos un símbolo.\n";
        }

        if (mensajeError) {
          event.preventDefault();
          alert(mensajeError);
        } else {
          event.preventDefault();
          alert("¡Registro exitoso!");
          form.reset();
        }
      });
    });
  </script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
